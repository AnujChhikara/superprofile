name: Deploy — API (Azure App Service)

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'widget/**'
      - '.github/workflows/deploy-server.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }

      - run: pnpm install --frozen-lockfile

      # Widget loader + frame → server/public/
      - name: Build widget
        run: pnpm --filter widget build

      # TypeScript → server/dist/
      - name: Build server
        run: pnpm --filter server build

      # Assemble a self-contained production zip:
      #   dist/    — compiled JS
      #   public/  — widget assets + demo page
      #   drizzle/ — migration files (run via release job if needed)
      #   package.json — needed by Azure npm start
      #   node_modules/ — production deps only (no build tooling on App Service)
      - name: Package for deployment
        run: |
          mkdir -p deploy-out
          cp -r server/dist   deploy-out/
          cp -r server/public deploy-out/
          cp    server/package.json deploy-out/
          [ -d server/drizzle ] && cp -r server/drizzle deploy-out/ || true
          cd deploy-out && npm install --omit=dev --ignore-scripts --no-package-lock && cd ..
          cd deploy-out && zip -r ../server.zip . && cd ..

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: superprofile-api
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: server.zip

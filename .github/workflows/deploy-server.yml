name: Deploy — API (Azure App Service)

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'widget/**'
      - '.github/workflows/deploy-server.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }

      - run: pnpm install --frozen-lockfile

      - name: Build widget
        run: pnpm --filter widget build

      - name: Build server
        run: pnpm --filter server build

      - name: Package for deployment
        run: |
          mkdir -p deploy-out
          cp -r server/dist   deploy-out/
          cp -r server/public deploy-out/
          cp    server/package.json deploy-out/
          [ -d server/drizzle ] && cp -r server/drizzle deploy-out/ || true
          cd deploy-out && npm install --omit=dev --ignore-scripts --no-package-lock && cd ..
          cd deploy-out && zip -r ../server.zip . && cd ..

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: superprofile-api
          package: server.zip
